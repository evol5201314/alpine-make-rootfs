name: Build Alpine Rootfs with SSH and Python

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Alpine Linux 分支版本'
        required: false
        default: 'v3.20'
        type: string
      timezone:
        description: '时区'
        required: false
        default: 'Asia/Shanghai'
        type: string
      extra_packages:
        description: '额外安装的 Alpine 包（空格分隔）'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 alpine-make-rootfs 脚本
        run: |
          wget https://raw.githubusercontent.com/alpinelinux/alpine-make-rootfs/v0.8.1/alpine-make-rootfs
          echo '2b21327244d2d63082dd4780e22549221e298206 alpine-make-rootfs' | sha1sum -c || exit 1
          chmod +x alpine-make-rootfs

      - name: 构建 Rootfs（预装 SSH + Python）
        run: |
          sudo ./alpine-make-rootfs \
            --branch ${{ github.event.inputs.branch }} \
            --packages 'openssh python3 py3-pip ${{ github.event.inputs.extra_packages }}' \
            --timezone '${{ github.event.inputs.timezone }}' \
            --script-chroot \
            alpine-rootfs-${{ github.run_number }}.tar.gz - <<'SHELL'
              # 开启 SSH 服务（容器内启用）
              rc-update add sshd default
              # 允许 root 登录（可选，根据需求调整）
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
              # 安装 Python 包（示例）
              pip3 install --no-cache-dir requests
          SHELL

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rootfs
          path: alpine-rootfs-*.tar.gz
          retention-days: 7
