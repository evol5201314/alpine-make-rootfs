name: Build Alpine Rootfs for ARM64 (QEMU Emulation)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Alpine Linux 分支版本'
        required: false
        default: 'v3.20'
        type: string
      timezone:
        description: '时区'
        required: false
        default: 'Asia/Shanghai'
        type: string
      extra_packages:
        description: '额外安装的 Alpine 包（空格分隔）'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 安装 QEMU 模拟器
        uses: docker/setup-qemu-action@v4

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 执行构建
        run: |
          docker run --rm --privileged --platform linux/arm64 \
            -v $(pwd):/workspace -w /workspace \
            -e BRANCH="${{ github.event.inputs.branch }}" \
            -e TIMEZONE="${{ github.event.inputs.timezone }}" \
            -e EXTRA_PACKAGES="${{ github.event.inputs.extra_packages }}" \
            -e RUN_NUMBER="${{ github.run_number }}" \
            alpine:latest sh /workspace/build.sh

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          files: alpine-rootfs-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物（Artifact 备份）
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rootfs
          path: alpine-rootfs-*.tar.gz
          retention-days: 7
