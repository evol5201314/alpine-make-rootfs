name: Build Alpine Rootfs with SSH and Python (Alpine container)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Alpine Linux 分支版本'
        required: false
        default: 'v3.20'
        type: string
      timezone:
        description: '时区'
        required: false
        default: 'Asia/Shanghai'
        type: string
      extra_packages:
        description: '额外安装的 Alpine 包（空格分隔）'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    # 使用 Alpine 官方容器作为运行环境，无需依赖宿主机的 apk
    container:
      image: alpine:latest

    steps:
      - name: 安装必要工具和 alpine-make-rootfs
        run: |
          apk update
          apk add \
            alpine-make-rootfs \
            openssh python3 py3-pip \
            bash curl tar gzip xz git \
            # 可选：添加更多构建时需要的工具
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Rootfs（预装 SSH + Python）
        run: |
          alpine-make-rootfs \
            --branch "${{ github.event.inputs.branch }}" \
            --packages "openssh python3 py3-pip ${{ github.event.inputs.extra_packages }}" \
            --timezone "${{ github.event.inputs.timezone }}" \
            --script-chroot \
            alpine-rootfs-${{ github.run_number }}.tar.gz - <<'SHELL'
              # 在 chroot 环境内执行的脚本
              rc-update add sshd default
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
              pip3 install --no-cache-dir requests
              # 可根据需要添加更多初始化命令
          SHELL

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rootfs
          path: alpine-rootfs-*.tar.gz
          retention-days: 7
