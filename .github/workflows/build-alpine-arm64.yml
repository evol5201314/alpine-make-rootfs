name: Build Alpine Rootfs with SSH and Python (Alpine container)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Alpine Linux 分支版本'
        required: false
        default: 'v3.20'
        type: string
      timezone:
        description: '时区'
        required: false
        default: 'Asia/Shanghai'
        type: string
      extra_packages:
        description: '额外安装的 Alpine 包（空格分隔）'
        required: false
        default: ''
        type: string

# 赋予写入 Release 的权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
      options: --privileged

    steps:
      - name: 安装必要工具
        run: |
          apk update
          apk add \
            alpine-make-rootfs \
            openssh python3 py3-pip \
            bash curl tar gzip xz git

      - name: 检出代码
        uses: actions/checkout@v4

      # 清理所有未跟踪文件，确保构建环境绝对干净
      - name: 清理工作目录（全新环境）
        run: git clean -fdx

      - name: 构建 Rootfs（预装 SSH + Python）
        run: |
          alpine-make-rootfs \
            --branch "${{ github.event.inputs.branch }}" \
            --arch aarch64 \
            --packages "openrc openssh python3 py3-pip ${{ github.event.inputs.extra_packages }}" \
            --timezone "${{ github.event.inputs.timezone }}" \
            --script-chroot \
            alpine-rootfs-${{ github.run_number }}.tar.gz - <<'SHELL'
              # 设置 root 密码（默认为 passwd，可自行修改）
              echo 'root:passwd' | chpasswd
              rc-update add sshd default
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
              sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
              pip3 install --no-cache-dir --break-system-packages requests
          SHELL

      # 上传到 GitHub Release（自动创建）
      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          files: alpine-rootfs-*.tar.gz
          generate_release_notes: true   # 自动生成变更日志
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # （可选）同时保留 Artifact 下载，便于在 Actions 页面直接获取
      - name: 上传构建产物（Artifact 备份）
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rootfs
          path: alpine-rootfs-*.tar.gz
          retention-days: 7
