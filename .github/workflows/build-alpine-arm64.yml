name: Build Alpine Rootfs for ARM64 (Native)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Alpine Linux 分支版本'
        required: false
        default: 'v3.20'
        type: string
      timezone:
        description: '时区'
        required: false
        default: 'Asia/Shanghai'
        type: string
      extra_packages:
        description: '额外安装的 Alpine 包（空格分隔）'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm   # ARM64 原生运行器

    steps:
      - name: 安装依赖并下载脚本
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          # 下载最新版 alpine-make-rootfs（支持 --timezone 等）
          wget https://raw.githubusercontent.com/alpinelinux/alpine-make-rootfs/master/alpine-make-rootfs
          chmod +x alpine-make-rootfs

      - name: 下载 ARM64 版本的 apk.static
        run: |
          # 使用与 Alpine 3.20 匹配的 apk-tools 版本（v2.14.10）
          wget -O apk.static https://gitlab.alpinelinux.org/api/v4/projects/5/packages/generic/v2.14.10/aarch64/apk.static
          chmod +x apk.static

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 构建 Rootfs（预装 SSH + Python + 必备工具）
        run: |
          # 让脚本使用我们下载的 apk.static
          export APK=$(pwd)/apk.static
          sudo -E ./alpine-make-rootfs \
            --branch "${{ github.event.inputs.branch }}" \
            --packages "openrc openssh python3 py3-pip bash curl tzdata ${{ github.event.inputs.extra_packages }}" \
            --timezone "${{ github.event.inputs.timezone }}" \
            --script-chroot \
            alpine-rootfs-${{ github.run_number }}.tar.gz - <<'SHELL'
              echo 'root:passwd' | chpasswd
              rc-update add sshd default
              sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
              sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
              pip3 install --no-cache-dir --break-system-packages requests
          SHELL

      - name: 上传到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          files: alpine-rootfs-*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物（Artifact 备份）
        uses: actions/upload-artifact@v4
        with:
          name: alpine-rootfs
          path: alpine-rootfs-*.tar.gz
          retention-days: 7
