name: Build Alpine ARM64 LXC 预装SSH+Python离线包
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ========== 第一步：清空工作目录，彻底删除上一次构建残留 ==========
      - name: Clean workspace old files
        run: |
          rm -rf ./*
          ls -la

      - name: 配置QEMU交叉编译aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y tar gzip curl wget qemu-user-static xz-utils

      - name: 下载官方修复版alpine-make-rootfs v0.7.0
        run: |
          curl -LO https://raw.githubusercontent.com/alpinelinux/alpine-make-rootfs/v0.7.0/alpine-make-rootfs
          chmod +x alpine-make-rootfs

      - name: 写入系统后置配置脚本（SSH放行、Python、双层缓存清理）
        run: |
          echo '#!/bin/sh' > customize.sh
          echo 'ssh-keygen -A' >> customize.sh
          echo 'sed -i "s/#PermitRootLogin prohibit-password/PermitRootLogin yes/" /etc/ssh/sshd_config' >> customize.sh
          echo 'echo "root:123456" | chpasswd' >> customize.sh
          echo 'rc-update add sshd default' >> customize.sh
          # 预装requests行情库
          echo 'pip install requests' >> customize.sh
          # 清理pip缓存
          echo 'pip cache purge' >> customize.sh
          # 清理apk安装缓存
          echo 'rm -rf /var/cache/apk/*' >> customize.sh
          chmod +x customize.sh

      - name: 构建ARM64离线rootfs包
        run: |
          sudo ./alpine-make-rootfs \
            --arch aarch64 \
            --version 3.23 \
            --packages openssh bash curl tzdata python3 py3-pip \
            --script customize.sh \
            alpine-3.23-aarch64-lxc-ssh-python.tar.gz

      - name: 上传离线成品包
        uses: actions/upload-artifact@v4
        with:
          name: LXC离线镜像-预装SSH-Python
          path: alpine-3.23-aarch64-lxc-ssh-python.tar.gz
