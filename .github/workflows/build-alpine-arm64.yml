name: 手动构建Alpine ARM64 LXC镜像（预装SSH+Python）
on:
  workflow_dispatch
env:
  ACTIONS_RUNNER_FORCE_NODE_VERSION: 24
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 前置清空工作区，杜绝上次构建残留混入镜像
      - name: 清理全部历史文件
        run: rm -rf ./*

      # QEMU升级v4，消除Node20废弃警告
      - name: 加载aarch64交叉编译环境
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      # 安装宿主机构建依赖
      - name: 安装工具链
        run: sudo apt update && sudo apt install -y tar gzip curl wget qemu-user-static xz-utils

      # 下载修复哈希bug的v0.7.0构建脚本
      - name: 获取alpine-make-rootfs v0.7.0
        run: |
          curl -LO https://raw.githubusercontent.com/alpinelinux/alpine-make-rootfs/v0.7.0/alpine-make-rootfs
          chmod +x alpine-make-rootfs

      # 后置配置脚本：SSH放行、Python预装、双重缓存清理
      - name: 生成install.sh配置脚本
        run: |
          echo '#!/bin/sh' > install.sh
          echo 'ssh-keygen -A' >> install.sh
          echo 'sed -i "s/#PermitRootLogin prohibit-password/PermitRootLogin yes/" /etc/ssh/sshd_config' >> install.sh
          echo 'echo "root:123456" | chpasswd' >> install.sh
          echo 'rc-update add sshd default' >> install.sh
          echo 'pip install requests' >> install.sh
          echo 'pip cache purge' >> install.sh
          echo 'rm -rf /var/cache/apk/*' >> install.sh
          chmod +x install.sh

      # 构建ARM64离线rootfs包
      - name: 构建镜像
        run: |
          sudo ./alpine-make-rootfs \
            --branch v3.23 \
            --arch aarch64 \
            --packages openssh bash curl tzdata python3 py3-pip \
            --script-chroot \
            alpine-v3.23-arm64-ssh-python.tar.gz -- ./install.sh

      # 上传成品离线镜像
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: LXC离线镜像-预装SSH-Python
          path: alpine-*.tar.gz
