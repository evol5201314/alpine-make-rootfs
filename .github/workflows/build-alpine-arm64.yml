name: 手动构建Alpine ARM64 LXC镜像
on:
  workflow_dispatch
env:
  ACTIONS_RUNNER_FORCE_NODE_VERSION: 24
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 清空工作目录，清除上次构建残留
      - name: 清理全部旧文件
        run: rm -rf ./*

      # QEMU v4 消除Node20废弃警告
      - name: 配置aarch64交叉编译
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      # 仅安装基础构建工具，不再安装不存在的apk-tools
      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y tar gzip curl wget qemu-user-static xz-utils jq

      # 下载v0.7.0修复版脚本
      - name: 下载alpine-make-rootfs v0.7.0
        run: |
          curl -LO https://raw.githubusercontent.com/alpinelinux/alpine-make-rootfs/v0.7.0/alpine-make-rootfs
          chmod +x alpine-make-rootfs

      # 自动拉取GitLab最新apk-tools，实时计算真实URI与SHA256，覆盖脚本内置失效值
      - name: 获取最新apk-tools校验信息
        run: |
          RELEASE=$(curl -s https://gitlab.alpinelinux.org/api/v4/projects/alpine%2Fapk-tools/releases/latest)
          TOOL_URL=$(echo "$RELEASE" | jq -r '.assets[] | select(.name | endswith("x86_64.tar.gz")) | .direct_asset_url')
          curl -L -o apk-tmp.tar.gz "$TOOL_URL"
          REAL_SHA=$(sha256sum apk-tmp.tar.gz | awk '{print $1}')
          echo "APK_TOOLS_URI=$TOOL_URL" >> $GITHUB_ENV
          echo "APK_TOOLS_SHA256=$REAL_SHA" >> $GITHUB_ENV

      # 生成预装SSH+Python+requests的后置脚本，双层缓存清理
      - name: 生成install.sh配置脚本
        run: |
          echo '#!/bin/sh' > install.sh
          echo 'ssh-keygen -A' >> install.sh
          echo 'sed -i "s/#PermitRootLogin prohibit-password/PermitRootLogin yes/" /etc/ssh/sshd_config' >> install.sh
          echo 'echo "root:123456" | chpasswd' >> install.sh
          echo 'rc-update add sshd default' >> install.sh
          echo 'pip install requests' >> install.sh
          echo 'pip cache purge' >> install.sh
          echo 'rm -rf /var/cache/apk/*' >> install.sh
          chmod +x install.sh

      # 传入环境变量覆盖内置哈希，完整执行校验，不跳过任何校验逻辑
      - name: 构建ARM64离线rootfs镜像
        env:
          APK_TOOLS_URI: ${{ env.APK_TOOLS_URI }}
          APK_TOOLS_SHA256: ${{ env.APK_TOOLS_SHA256 }}
        run: |
          sudo ./alpine-make-rootfs \
            --branch v3.23 \
            --arch aarch64 \
            --packages openssh bash curl tzdata python3 py3-pip \
            --script-chroot \
            alpine-v3.23-arm64-ssh-python.tar.gz -- ./install.sh

      # 上传成品离线镜像包
      - name: 上传镜像产物
        uses: actions/upload-artifact@v4
        with:
          name: LXC离线镜像-预装SSH-Python
          path: alpine-*.tar.gz
